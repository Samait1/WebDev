<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Bootstrap Forms</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>
<body class="bg-light">

<div class="container my-5">

    <!-- ================= CONTACT FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">Contact Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter your full name" required>

                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="tel" class="form-control mb-3"
                    placeholder="Enter your phone number" required>

                <input type="password" class="form-control mb-3"
                    placeholder="Enter your password" required>

                <input type="date" class="form-control mb-3" required>

                <input type="time" class="form-control mb-3" required>

                <label class="form-label">Choose your favorite color</label>
                <input type="color" class="form-control form-control-color mb-3"
                    required>

                <label class="form-label">Select a range</label>
                <input type="range" class="form-range mb-3" required>

                <input type="url" class="form-control mb-3"
                    placeholder="Enter your website URL" required>

                <input type="search" class="form-control mb-3"
                    placeholder="Search for something" required>

                <input type="file" class="form-control mb-3" required>

                <button type="submit" class="btn btn-primary">
                    Submit Contact Form
                </button>
            </form>
        </div>
    </div>

    <!-- ================= BLOG POST FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-success text-white">
            <h2 class="mb-0">Blog Post Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter blog title" required>

                <input type="text" class="form-control mb-3"
                    placeholder="Enter author name" required>

                <input type="text" class="form-control mb-3"
                    placeholder="Enter category" required>

                <textarea class="form-control mb-3" rows="6"
                    placeholder="Write your blog content here..."
                    required></textarea>

                <input type="url" class="form-control mb-3"
                    placeholder="Reference website URL">

                <input type="search" class="form-control mb-3"
                    placeholder="Search tags or keywords">

                <input type="color" class="form-control form-control-color mb-3">

                <input type="range" class="form-range mb-3">

                <input type="file" class="form-control mb-3">

                <button type="submit" class="btn btn-success">
                    Publish Blog Post
                </button>
            </form>
        </div>
    </div>

    <!-- ================= SIGN UP FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-warning text-dark">
            <h2 class="mb-0">Sign Up Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter your full name" required>

                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="tel" class="form-control mb-3"
                    placeholder="Enter your phone number" required>

                <input type="password" class="form-control mb-3"
                    placeholder="Create a password" required>

                <input type="date" class="form-control mb-3" required>

                <input type="url" class="form-control mb-3"
                    placeholder="Enter your website URL">

                <input type="file" class="form-control mb-3">

                <button type="submit" class="btn btn-warning text-dark">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <!-- ================= SIGN IN FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Sign In Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="password" class="form-control mb-3"
                    placeholder="Enter your password" required>

                <input type="time" class="form-control mb-3"
                    placeholder="Preferred login time">

                <input type="search" class="form-control mb-3"
                    placeholder="Search help topics">

                <button type="submit" class="btn btn-danger">
                    Sign In
                </button>
            </form>
        </div>
    </div>

</div>

<!-- Bootstrap JS Bundle -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
