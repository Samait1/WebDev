<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Bootstrap Forms</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>
<body class="bg-light">

<div class="container my-5">

    <!-- ================= CONTACT FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-secondary text-black">
            <h2 class="mb-0">Contact Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter your full name" required>

                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="tel" class="form-control mb-3"
                    placeholder="Enter your phone number" required>
                
                <button type="submit" class="btn btn-secondary text-black">
                    Submit Contact Form
                </button>
            </form>
        </div>
    </div>

    <!-- ================= BLOG POST FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-secondary text-black">
            <h2 class="mb-0">Blog Post Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter blog title" required>

                <input type="text" class="form-control mb-3"
                    placeholder="Enter author name" required>

                <input type="text" class="form-control mb-3"
                    placeholder="Enter category" required>

                <textarea class="form-control mb-3" rows="6"
                    placeholder="Write your blog content here..."
                    required></textarea>
                    
                <input type="search" class="form-control mb-3"
                    placeholder="Search tags or keywords">
                
                <button type="submit" class="btn btn-secondary text-black">
                    Publish Blog Post
                </button>
            </form>
        </div>
    </div>

    <!-- ================= SIGN UP FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-secondary text-black">
            <h2 class="mb-0">Sign Up Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="text" class="form-control mb-3"
                    placeholder="Enter your full name" required>

                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="tel" class="form-control mb-3"
                    placeholder="Enter your phone number" required>

                <input type="password" class="form-control mb-3"
                    placeholder="Create a password" required>
                    
                <button type="submit" class="btn btn-secondary text-black">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <!-- ================= SIGN IN FORM ================= -->
    <div class="card shadow mb-5">
        <div class="card-header bg-secondary text-black">
            <h2 class="mb-0">Sign In Form</h2>
        </div>
        <div class="card-body">
            <form action="">
                <input type="email" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="password" class="form-control mb-3"
                    placeholder="Enter your password" required>
                    
                <button type="submit" class="btn btn-secondary text-black">
                    Sign In
                </button>
            </form>
        </div>
    </div>

</div>

<!-- Bootstrap JS Bundle -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
